name: website preview

# Per-PR canary previews of the website. On a PR that touches website/**,
# builds the site, publishes it to `gh-pages/pr-<N>/`, and comments the
# preview URL on the PR. On PR close (merged or not), removes the
# `pr-<N>/` directory from the gh-pages branch.
#
# Main-branch deploy is in `website.yml`; both write to the same gh-pages
# branch and serialize via the `pages` concurrency group.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    paths:
      - 'website/**'
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/website-preview.yml'

permissions:
  contents: write       # rossjrw/pr-preview-action pushes to gh-pages
  pull-requests: write  # rossjrw/pr-preview-action comments on the PR

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    # Skip the build step entirely when the PR is closing — the deploy
    # action's `action: remove` mode only needs the PR number, not the
    # built output.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        if: github.event.action != 'closed'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1'

      - name: Install + build
        if: github.event.action != 'closed'
        working-directory: website
        env:
          # rossjrw/pr-preview-action publishes the build to
          # gh-pages:/pr-preview/pr-<N>/ (the umbrella-dir + PR-number
          # path). Astro's base must match the live URL exactly or the
          # rendered HTML references CSS/JS/sprites at the wrong path
          # and the preview ships unstyled.
          PR_PREVIEW_BASE: /agent-smith/pr-preview/pr-${{ github.event.number }}/
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun install --frozen-lockfile
          # Generate crew-status.json before build. The file is gitignored
          # because CI owns it; without this step, src/pages/log/index.astro's
          # import resolves to nothing and the build fails. Mirrors the
          # main-branch website.yml step.
          bun scripts/refresh-crew-status.ts
          bun run build

      - name: Deploy preview to gh-pages/pr-<N>/
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./website/dist
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto

      # Regression guard for preview deploys: same shape as the main
      # workflow's check — if the preview URL doesn't go 200 within
      # 5 minutes of the deploy, fail loudly. Only run on the deploy
      # leg of the workflow; on PR close the preview is removed and
      # the URL is expected to 404.
      - name: Verify preview URL is reachable
        if: github.event.action != 'closed'
        run: |
          URL="https://sherodtaylor.github.io/agent-smith/pr-preview/pr-${{ github.event.number }}/"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w "%{http_code}" "${URL}?cb=$(date +%s)")
            echo "[$i/30] ${URL} -> ${code}"
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: preview URL still not 200 after 5 minutes — check repo Settings → Pages." >&2
          exit 1
