name: website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - 'README.md'
      - '.github/workflows/website.yml'
    # Release tags trigger a rebuild so the tmux status bar's
    # `last_release` reflects the new version immediately.
    tags:
      - 'v*'
  # Daily refresh so `prs_this_week` stays accurate even when no
  # website source files change between releases.
  schedule:
    - cron: '17 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: write   # peaceiris/actions-gh-pages pushes to the gh-pages branch

# Both this workflow and website-preview.yml push to the same `gh-pages`
# branch; this concurrency group serializes them so a fast-following
# preview deploy doesn't race the main deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1'
      - name: Install dependencies
        working-directory: website
        run: bun install --frozen-lockfile
      - name: Refresh crew status
        working-directory: website
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun scripts/refresh-crew-status.ts
      - name: Check roadmap sync
        working-directory: website
        run: bun scripts/check-roadmap-sync.ts
      - name: Build
        working-directory: website
        run: bun run build
      # Deploy the site to gh-pages/ — main entry point at the root.
      # `keep_files: true` preserves any /pr-N/ subdirectories that the
      # preview workflow has created so they don't get wiped on each
      # main deploy. The preview workflow itself owns cleanup of those
      # directories when PRs close.
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/dist
          publish_branch: gh-pages
          keep_files: true
          # Exclude the /pr-N/ paths from the rsync the action does, so
          # the main publish doesn't reach down and stomp on preview
          # directories under the root. (peaceiris honors `exclude_assets`
          # for the source side; for the destination, `keep_files: true`
          # is what protects existing previews.)
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'website: deploy ${{ github.sha }}'
